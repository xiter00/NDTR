name: Compile ESP32-S3 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.0.4"

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "UniversalTelegramBot"
          arduino-cli lib install "TFT_eSPI" 
          arduino-cli lib install "TJpg_Decoder"
          arduino-cli lib install "AnimatedGIF"
          
          mkdir -p $HOME/Arduino/libraries
          cd $HOME/Arduino/libraries
          git clone https://github.com/me-no-dev/AsyncTCP.git
          git clone https://github.com/me-no-dev/ESPAsyncWebServer.git
        
      - name: Prepare Partition Table
        run: |
          python3 -c "
          import os
          os.makedirs('IPS1', exist_ok=True)
          with open('IPS1/partitions.csv', 'w') as f:
              f.write('# Name,   Type, SubType, Offset,  Size, Flags\n')
              f.write('nvs,      data, nvs,     0x9000,  0x5000,\n')
              f.write('phy_init, data, phy,     0xe000,  0x1000,\n')
              f.write('app0,     app,  factory, 0x10000, 0x300000,\n')   # Firmware kita di 0x10000
              f.write('video,    data, spiffs,  0x310000, 0xCE0000,\n')  # Video kita di 0x310000
          print('SUKSES: partitions.csv dibuat!')
          "

      - name: Compile Sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:FlashSize=16M,PSRAM=opi,CPUFreq=240,FlashMode=dio,CDCOnBoot=cdc \
            --build-property "build.partitions=partitions.csv" \
            --build-property "compiler.cpp.extra_flags=-DUSER_SETUP_LOADED=1 -DST7789_DRIVER=1 -DTFT_WIDTH=135 -DTFT_HEIGHT=240 -DTFT_CS=10 -DTFT_DC=9 -DTFT_RST=8 -DCGRAM_OFFSET=1 -DSPI_FREQUENCY=80000000" \
            --export-binaries \
            ./IPS1

      - name: Kumpulin File Terpisah (Biar Gampang Di-Flash)
        run: |
          mkdir -p Siap_Flash
          # Copy hasil compile jadi nama yang gampang dibaca
          cp IPS1/build/**/*.ino.bootloader.bin Siap_Flash/1_bootloader.bin
          cp IPS1/build/**/*.ino.partitions.bin Siap_Flash/2_partitions.bin
          cp IPS1/build/**/*.ino.bin Siap_Flash/3_firmware_utama.bin
          
          # Copy video mentah jadikan partisi bin
          cp IPS1/data/video.mjpeg Siap_Flash/4_video_12MB.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_Terpisah_Tinggal_Flash
          path: Siap_Flash/*
          retention-days: 7
