name: Compile ESP32-S3 Firmware

# Trigger workflow kalau ada push ke branch main atau dijalankan manual
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.0.4"

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          # Install library resmi dari Arduino Library Manager
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "UniversalTelegramBot"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit ST7735 and ST7789 Library"
          arduino-cli lib install "TJpg_Decoder"
          arduino-cli lib install "AnimatedGIF"
          
          # Clone manual AsyncTCP dan ESPAsyncWebServer ke folder library Arduino
          mkdir -p $HOME/Arduino/libraries
          cd $HOME/Arduino/libraries
          git clone https://github.com/me-no-dev/AsyncTCP.git
          git clone https://github.com/me-no-dev/ESPAsyncWebServer.git
        
      - name: Auto Convert MJPEG to Hex Array (Anti Freeze HP)
        run: |
          python3 -c "
          import os
          file_path = 'IPS1/data/video.mjpeg'
          if os.path.exists(file_path):
              with open(file_path, 'rb') as f:
                  data = f.read()
              chunks = [', '.join([f'0x{b:02x}' for b in data[i:i+16]]) for i in range(0, len(data), 16)]
              hex_content = ',\n'.join(chunks)
              with open('IPS1/video_data.h', 'w') as f:
                  f.write('#include <pgmspace.h>\n')
                  f.write('static const unsigned char video_mjpeg[] PROGMEM = {\n' + hex_content + '\n};\n')
                  f.write(f'static const uint32_t video_size = {len(data)};\n')
              print('Sukses convert video ke Hex lewat server GitHub!')
          else:
              print('File video.mjpeg tidak ditemukan di folder data!')
          "
          

      - name: Compile Sketch
        run: |
          # Compile dengan parameter khusus ESP32-S3 N16R8 (Flash 16MB, OPI PSRAM)
          # Ganti "ESP32_Pro_Control" sesuai nama folder dan file .ino lo
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:FlashSize=16M,PSRAM=opi \
            --export-binaries \
            ./IPS1

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPSTestFirmware
          # Upload semua file .bin hasil compile
          path: ./IPS1/build/**/*.bin
          retention-days: 7
