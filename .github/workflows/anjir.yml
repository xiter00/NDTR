name: Compile ESP32-S3 Firmware

# Trigger workflow kalau ada push ke branch main atau dijalankan manual
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.0.4"

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "UniversalTelegramBot"
          # Ganti Adafruit dengan TFT_eSPI
          arduino-cli lib install "TFT_eSPI" 
          arduino-cli lib install "TJpg_Decoder"
          arduino-cli lib install "AnimatedGIF"
          
          # Clone manual AsyncTCP dan ESPAsyncWebServer ke folder library Arduino
          mkdir -p $HOME/Arduino/libraries
          cd $HOME/Arduino/libraries
          git clone https://github.com/me-no-dev/AsyncTCP.git
          git clone https://github.com/me-no-dev/ESPAsyncWebServer.git
        
      - name: Auto Convert MJPEG to Hex & Create Custom Partition
        run: |
          python3 -c "
          import os
          file_path = 'IPS1/data/video.mjpeg'
          if os.path.exists(file_path):
              with open(file_path, 'rb') as f:
                  data = f.read()
              chunks = [', '.join([f'0x{b:02x}' for b in data[i:i+16]]) for i in range(0, len(data), 16)]
              hex_content = ',\n'.join(chunks)
              
              os.makedirs('IPS1', exist_ok=True)
              
              # Tulis file video_data.h di dalam folder IPS1
              with open('IPS1/video_data.h', 'w') as f:
                  f.write('#include <pgmspace.h>\nstatic const unsigned char video_mjpeg[] PROGMEM = {\n' + hex_content + '\n};\nstatic const uint32_t video_size = ' + str(len(data)) + ';\n')
              
              # Bikin file partitions.csv
              with open('IPS1/partitions.csv', 'w') as f:
                  f.write('# Name,   Type, SubType, Offset,  Size, Flags\n')
                  f.write('nvs,      data, nvs,     0x9000,  0x5000,\n')
                  f.write('phy_init, data, phy,     0xe000,  0x1000,\n')
                  f.write('app0,     app,  factory, 0x10000, 0xD00000,\n')
                  f.write('ffat,     data, fat,     0xD10000,0x2F0000,\n')
                  
              print('SUKSES: video_data.h dan partitions.csv sukses dibuat di folder IPS1, Cok!')
          else:
              print('ERROR: File data/video.mjpeg tidak ditemukan!')
          "

      - name: Compile Sketch
        run: |
          # FQBN Racikan N16R8 + Injeksi settingan layar TFT_eSPI langsung ke compiler!
          # Mengubah target dari ./STR menjadi ./IPS1 karena script Python ditaruh disitu
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:FlashSize=16M,PSRAM=opi,CPUFreq=240,FlashMode=qio,FlashFreq=80,CDCOnBoot=cdc \
            --build-property "build.partitions=partitions.csv" \
            --build-property "compiler.cpp.extra_flags=-DUSER_SETUP_LOADED=1 -DST7789_DRIVER=1 -DTFT_WIDTH=135 -DTFT_HEIGHT=240 -DTFT_CS=10 -DTFT_DC=9 -DTFT_RST=8 -DCGRAM_OFFSET=1 -DSPI_FREQUENCY=80000000" \
            --export-binaries \
            ./IPS1

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPSTestFirmware
          # Upload semua file .bin hasil compile
          path: ./IPS1/build/**/*.bin
          retention-days: 7
